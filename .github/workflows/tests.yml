name: unit-tests

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  wrapper-cross-platform:
    name: wrapper-unit (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run cross-platform wrapper tests (no real external tools)
        run: python -m unittest -v test.test_vcf_rdfizer_cross_platform_unit

  shell-posix:
    name: shell+pipeline-unit (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - ubuntu-22.04
          - macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run full unit test suite
        run: python -m unittest discover -s test -p "test_*_unit.py" -v

  coverage:
    name: coverage-upload
    runs-on: ubuntu-latest
    needs:
      - wrapper-cross-platform
      - shell-posix
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run coverage
        run: |
          python -m pip install --upgrade pip coverage
          coverage run -m unittest discover -s test -p "test_*_unit.py"
          coverage xml -o coverage.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          flags: unittests
          name: vcf-rdfizer-unit-tests
          fail_ci_if_error: false

  package-smoke:
    name: package-smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    needs:
      - wrapper-cross-platform
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build + install wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build
          python -m pip install dist/*.whl
          vcf-rdfizer --help
